# ============================================================================
# JobPilot — Custom Screening Question Answers
# ============================================================================
# Edit this file to control how JobPilot fills custom screening questions.
#
# Format:
#   Each entry maps a question pattern → your answer.
#   Patterns are case-insensitive and match partial text in the question label.
#   Use "[skip]" to leave a field blank (you'll fill it manually).
#
# Special variables you can use in answers:
#   {company}     — company name from the URL
#   {role}        — job title from the page heading
#   {first_name}  — your first name from profile
#   {last_name}   — your last name from profile
# ============================================================================

